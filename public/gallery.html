<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Lumière Beauty & Nail Studio</title>
  <meta name="description" content="A look at recent nail art, hair color, makeup and skin work from the Lumière studio." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#b0657a">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Lumière Beauty & Nail Studio">
  <meta property="og:title" content="Gallery — Lumière Beauty & Nail Studio">
  <meta property="og:description" content="A look at recent nail art, hair color, makeup and skin work from the Lumière studio.">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <main id="main-content">
    <section class="container">
      <div class="section-head">
        <p class="eyebrow">Our work</p>
        <h2>The Lumière gallery</h2>
        <p class="muted">A taste of what our artists create every day. Filter by category, then book the look you love.</p>
      </div>
      <div class="filters" id="filters"></div>
      <div class="gallery" id="gallery"></div>
      <div class="center" style="margin-top:2.4rem"><a class="btn btn-primary" href="booking.html">Book your look</a></div>

      <!-- Lightbox -->
      <div id="lb" role="dialog" aria-modal="true" aria-label="Image lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;align-items:center;justify-content:center">
        <button id="lb-close" aria-label="Close" style="position:absolute;top:1rem;right:1.2rem;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;line-height:1">✕</button>
        <button id="lb-prev" aria-label="Previous" style="position:absolute;left:1rem;background:none;border:none;color:#fff;font-size:2.5rem;cursor:pointer;line-height:1;padding:.5rem">‹</button>
        <button id="lb-next" aria-label="Next" style="position:absolute;right:1rem;background:none;border:none;color:#fff;font-size:2.5rem;cursor:pointer;line-height:1;padding:.5rem">›</button>
        <div style="text-align:center;max-width:min(90vw,900px);padding:0 3rem">
          <img id="lb-img" src="" alt="" style="max-width:100%;max-height:80vh;border-radius:8px;object-fit:contain">
          <p id="lb-caption" style="color:#e8d5c0;margin-top:.8rem;font-size:.9rem"></p>
        </div>
      </div>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="js/common.js?v=7"></script>
  <script>
    const GRADS = ['#c98a86','#5a3d4f','#c8a96a','#a85f5b','#9d7b8c','#d8a48f','#7a5c6e','#caa37a'];
    let ITEMS = [], current = 'all', lbIdx = -1;

    // ---- Lightbox ----
    function lbVisible() { return document.getElementById('lb').style.display !== 'none'; }
    function lbImages() { return ITEMS.filter(i => (current === 'all' || i.category === current) && i.imageUrl); }
    function openLb(item) {
      const imgs = lbImages();
      lbIdx = imgs.findIndex(i => i === item);
      if (lbIdx < 0) return;
      showLb();
    }
    function showLb() {
      const imgs = lbImages();
      if (!imgs.length) return;
      const item = imgs[lbIdx];
      const lb = document.getElementById('lb');
      lb.style.display = 'flex';
      document.getElementById('lb-img').src = item.imageUrl;
      document.getElementById('lb-img').alt = item.title;
      document.getElementById('lb-caption').textContent = item.caption || item.title || '';
      document.getElementById('lb-prev').style.opacity = lbIdx > 0 ? '1' : '.3';
      document.getElementById('lb-next').style.opacity = lbIdx < imgs.length - 1 ? '1' : '.3';
      document.body.style.overflow = 'hidden';
    }
    function closeLb() {
      document.getElementById('lb').style.display = 'none';
      document.body.style.overflow = '';
    }
    document.getElementById('lb-close').addEventListener('click', closeLb);
    document.getElementById('lb').addEventListener('click', e => { if (e.target === e.currentTarget) closeLb(); });
    document.getElementById('lb-prev').addEventListener('click', () => { if (lbIdx > 0) { lbIdx--; showLb(); } });
    document.getElementById('lb-next').addEventListener('click', () => {
      if (lbIdx < lbImages().length - 1) { lbIdx++; showLb(); }
    });
    document.addEventListener('keydown', e => {
      if (!lbVisible()) return;
      if (e.key === 'Escape') closeLb();
      if (e.key === 'ArrowLeft' && lbIdx > 0) { lbIdx--; showLb(); }
      if (e.key === 'ArrowRight' && lbIdx < lbImages().length - 1) { lbIdx++; showLb(); }
    });

    // ---- Tiles ----
    function tileHtml(item, idx) {
      const clickable = item.imageUrl ? ' style="cursor:zoom-in"' : '';
      if (item.imageUrl) {
        return `<div class="tile" data-lb="1" style="padding:0;overflow:hidden;cursor:zoom-in" title="${esc(item.caption || item.title)}">
          <img src="${esc(item.imageUrl)}" alt="${esc(item.title)}" loading="lazy"
               style="width:100%;height:100%;object-fit:cover;pointer-events:none">
          <span style="position:absolute;bottom:0;left:0;right:0;padding:.5rem .7rem;
                       background:linear-gradient(transparent,rgba(0,0,0,.55));
                       font-size:.78rem;font-family:var(--font-body);font-weight:500;color:#fff">
            ${esc(item.title)}
          </span>
        </div>`;
      }
      return `<div class="tile" style="background:linear-gradient(135deg,${GRADS[idx%GRADS.length]},${GRADS[(idx+3)%GRADS.length]});flex-direction:column;gap:.4rem;position:relative" title="${esc(item.caption || item.title)}">
        <span style="font-size:2rem">${esc(item.emoji || '🖼️')}</span>
        <span style="font-size:.8rem;font-family:var(--font-body);font-weight:500;opacity:.95">${esc(item.title)}</span>
      </div>`;
    }

    function render() {
      const el = document.getElementById('gallery');
      const filtered = ITEMS.filter(i => current === 'all' || i.category === current);
      el.innerHTML = filtered.length
        ? filtered.map((item, idx) => `<div style="position:relative">${tileHtml(item, idx)}</div>`).join('')
        : `<p class="muted" style="text-align:center;padding:2rem;grid-column:1/-1">No items in this category yet.</p>`;
      // Wire lightbox clicks on image tiles
      el.querySelectorAll('.tile[data-lb]').forEach(tile => {
        const idx = [...el.querySelectorAll('.tile[data-lb]')].indexOf(tile);
        tile.addEventListener('click', () => {
          const imgs = ITEMS.filter(i => (current === 'all' || i.category === current) && i.imageUrl);
          if (idx >= 0 && idx < imgs.length) { lbIdx = idx; showLb(); }
        });
      });
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const [CFG, gData] = await Promise.all([
        window.__CFG__ || api.config().then(c => (window.__CFG__ = c)),
        fetch('/api/gallery').then(r => r.json()),
      ]);
      ITEMS = gData.gallery || [];
      const cats = [{id:'all',name:'All'}, ...CFG.categories];
      document.getElementById('filters').innerHTML = cats.map(c=>
        `<button class="chip ${c.id==='all'?'active':''}" data-cat="${c.id}">${c.name}</button>`).join('');
      document.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{
        document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
        ch.classList.add('active'); current=ch.dataset.cat; render();
      }));
      render();
    });
  </script>
</body>
</html>
