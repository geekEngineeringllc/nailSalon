<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My account — Lumière Beauty & Nail Studio</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <main>
    <section class="container" id="content" style="min-height:50vh"></section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="js/common.js?v=6"></script>
  <script>
    const todayISO = () => { const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,10); };
    function bookingCard(b, allowManage) {
      const actions = allowManage
        ? `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:.5rem">
             <div class="price">${money(b.price)}</div>
             <div style="display:flex;gap:.4rem;flex-wrap:wrap;justify-content:flex-end">
               <button class="btn btn-ghost btn-sm" onclick="openReschedule('${b.id}','${esc(b.serviceName)}','${b.date}','${b.staffId || ''}','${b.serviceId || ''}')">Reschedule</button>
               <button class="btn btn-ghost btn-sm" style="color:#b94646" onclick="cancelBooking('${b.id}','${esc(b.ref)}')">Cancel</button>
             </div>
           </div>`
        : `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:.4rem">
             <div class="price">${money(b.price)}</div>
             ${b.status !== 'cancelled' && b.serviceId
               ? `<a class="btn btn-ghost btn-sm" href="booking.html?service=${b.serviceId}">Rebook →</a>`
               : ''}
           </div>`;
      return `<div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap" id="bcard-${b.id}">
        <div>
          <div style="font-family:var(--font-display);font-size:1.2rem">${esc(b.serviceName)}</div>
          <div class="muted" style="font-size:.9rem">${b.date} · ${b.time} · with ${esc(b.staffName)}</div>
          <div style="font-size:.8rem;margin-top:.3rem"><span class="status ${b.status}">${b.status}</span> · ${b.ref}</div>
        </div>
        ${actions}
      </div>`;
    }
    function packageCard(p, svcMap) {
      const pct = Math.round((p.remaining / p.total) * 100);
      const paid = p.paymentStatus === 'paid';
      const svcName = (svcMap && svcMap[p.serviceId] && svcMap[p.serviceId].name) || p.serviceId;
      const bookUrl = paid && p.remaining > 0 && p.serviceId ? `booking.html?service=${p.serviceId}` : 'booking.html';
      return `<div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap">
        <div style="flex:1;min-width:0">
          <div style="font-family:var(--font-display);font-size:1.1rem">${esc(p.name)}</div>
          <div class="muted" style="font-size:.85rem">${esc(svcName)} · ${p.remaining} of ${p.total} sessions left</div>
          <div style="margin-top:.5rem;height:6px;background:var(--bg-soft);border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--rose),var(--rose-deep))"></div>
          </div>
          ${!paid ? '<div style="font-size:.78rem;margin-top:.4rem;color:#a9772a">Payment pending — see the desk to complete purchase</div>' : ''}
        </div>
        <div style="text-align:right">
          <div class="price">${money(p.price)}</div>
          ${paid && p.remaining > 0 ? `<a class="btn btn-ghost btn-sm" href="${bookUrl}" style="margin-top:.4rem">Use a session →</a>` : ''}
        </div>
      </div>`;
    }
    function render(me, cfg, refData) {
      const c = me.customer;
      const today = todayISO();
      const upcoming = me.bookings.filter(b => b.status !== 'cancelled' && (b.date > today || (b.date === today)));
      const past = me.bookings.filter(b => !(b.date > today || b.date === today) || b.status === 'cancelled');
      const myPkgs = c.packages || [];
      const availPkgs = (cfg && cfg.packages || []).filter(p => p.active !== false);
      const svcMap = Object.fromEntries((cfg && cfg.services || []).map(s => [s.id, s]));
      document.getElementById('content').innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem;margin:2rem 0">
          <div>
            <p class="eyebrow">My account</p>
            <h2 style="margin:0">Hi, ${esc(c.name.split(' ')[0])}</h2>
            <p class="muted">${esc(c.phone)}${c.email ? ' · ' + esc(c.email) : ''}</p>
          </div>
          <button class="btn btn-ghost btn-sm" id="logout">Log out</button>
        </div>

        ${(() => {
          const visits = me.bookings.filter(b => b.status === 'completed').length;
          const tier = visits >= 25 ? {label:'Platinum',color:'#7c6fa0',next:null,nextAt:null}
                     : visits >= 10 ? {label:'Gold',color:'#c6960a',next:'Platinum',nextAt:25}
                     : visits >= 5  ? {label:'Silver',color:'#6b8fa0',next:'Gold',nextAt:10}
                     :                {label:'Bronze',color:'#9a6b4b',next:'Silver',nextAt:5};
          return `<div style="display:flex;justify-content:center;margin-bottom:1.2rem">
            <span style="background:${tier.color}1a;color:${tier.color};font-weight:600;font-size:.82rem;padding:.3rem .9rem;border-radius:24px;border:1.5px solid ${tier.color}40;letter-spacing:.04em">${tier.label} member${tier.next ? ` · ${tier.nextAt - visits} visit${tier.nextAt - visits !== 1 ? 's' : ''} to ${tier.next}` : ''}</span>
          </div>`;
        })()}
        <div class="grid grid-3" style="margin-bottom:.8rem">
          <div class="stat"><div class="big">${c.points || 0}</div><div class="lbl">Reward points</div></div>
          <div class="stat"><div class="big">${upcoming.length}</div><div class="lbl">Upcoming visits</div></div>
          <div class="stat"><div class="big">${me.bookings.length}</div><div class="lbl">Total visits</div></div>
        </div>
        ${c.points >= 100 ? `<p class="muted" style="font-size:.83rem;text-align:center;margin-bottom:2rem">You have <strong>${c.points} pts</strong> — worth <strong>${money(Math.floor(c.points/100))}</strong> off your next visit. Mention at checkout to redeem.</p>` : `<p class="muted" style="font-size:.83rem;text-align:center;margin-bottom:2rem">Every 100 points = $1 off a future visit. Mention at checkout to redeem.</p>`}

        <div style="display:flex;justify-content:space-between;align-items:center">
          <h3>Upcoming</h3><a class="btn btn-primary btn-sm" href="booking.html">+ Book again</a>
        </div>
        <div class="grid" style="gap:1rem;margin-bottom:2.5rem">
          ${upcoming.length ? upcoming.map(b => bookingCard(b, true)).join('') : '<p class="muted">No upcoming visits. <a href="booking.html" style="color:var(--rose-deep)">Book one →</a></p>'}
        </div>

        <h3>Past visits</h3>
        <div class="grid" style="gap:1rem;margin-bottom:2.5rem">
          ${past.length ? past.map(b => bookingCard(b, false)).join('') : '<p class="muted">No past visits yet.</p>'}
        </div>

        ${refData && refData.referralCode ? `
        <h3>Refer a friend</h3>
        <div class="card" style="margin-bottom:2.5rem">
          <p class="muted" style="font-size:.9rem;margin-top:0">Share your code and earn <strong>200 bonus points</strong> when a friend completes their first visit. They get <strong>100 bonus points</strong> too.</p>
          <div style="display:flex;gap:.6rem;align-items:center;flex-wrap:wrap">
            <code style="background:var(--bg-soft);padding:.5rem 1rem;border-radius:8px;font-size:1.1rem;letter-spacing:.1em">${esc(refData.referralCode)}</code>
            <button class="btn btn-ghost btn-sm" id="copyRef">Copy code</button>
            <button class="btn btn-ghost btn-sm" id="shareRef">Share link</button>
          </div>
          ${refData.totalReferred > 0 ? `<p class="muted" style="font-size:.85rem;margin-bottom:0;margin-top:.8rem">${refData.claimedReferrals} of ${refData.totalReferred} referral${refData.totalReferred!==1?'s':''} redeemed · ${refData.pendingReferrals} pending</p>` : ''}
        </div>` : ''}

        ${myPkgs.length ? `
        <h3>My packages</h3>
        <div class="grid" style="gap:1rem;margin-bottom:2.5rem">
          ${myPkgs.map(p => packageCard(p, svcMap)).join('')}
        </div>` : ''}

        ${availPkgs.length ? `
        <div style="display:flex;justify-content:space-between;align-items:center">
          <h3>Available packages</h3>
        </div>
        <div class="grid" style="gap:1rem;margin-bottom:2.5rem">
          ${availPkgs.map(p => {
            const svcName = (svcMap[p.serviceId] && svcMap[p.serviceId].name) || p.serviceId;
            return `<div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap">
              <div>
                <div style="font-family:var(--font-display);font-size:1.1rem">${esc(p.name)}</div>
                <div class="muted" style="font-size:.85rem">${p.sessions} sessions · ${esc(svcName)}</div>
                ${p.description ? `<div class="muted" style="font-size:.82rem;margin-top:.2rem">${esc(p.description)}</div>` : ''}
              </div>
              <div style="text-align:right">
                <div class="price">${money(p.price)}</div>
                <div class="muted" style="font-size:.78rem">Pay at salon</div>
              </div>
            </div>`;
          }).join('')}
        </div>` : ''}

        ${(() => {
          const mem = c.membership;
          const STATUS_COLOR = { active: '#2f7a45', pending_payment: '#a9772a', cancelled: '#b0657a' };
          const STATUS_LBL = { active: 'Active', pending_payment: 'Pending payment — see the desk', cancelled: 'Cancelled' };
          if (mem) {
            return `<h3>My membership</h3>
            <div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:2.5rem">
              <div>
                <div style="font-family:var(--font-display);font-size:1.15rem">${esc(mem.planName)}</div>
                <div class="muted" style="font-size:.85rem">${mem.discountPct}% off all services · ${money(mem.monthlyPrice)}/mo</div>
                ${mem.renewalDate ? '<div class="muted" style="font-size:.82rem">Renews ' + esc(mem.renewalDate) + '</div>' : ''}
              </div>
              <div><span style="font-size:.85rem;font-weight:600;color:${STATUS_COLOR[mem.status] || 'inherit'}">${STATUS_LBL[mem.status] || mem.status}</span></div>
            </div>`;
          }
          const availPlans = (cfg && cfg.membershipPlans || []).filter(p => p.active !== false);
          if (!availPlans.length) return '';
          return `<h3>Membership plans</h3>
          <p class="muted" style="margin-top:-.5rem;font-size:.9rem">Join a plan and save on every visit. Request sign-up at the desk or tap below — we'll activate it when payment is collected.</p>
          <div class="grid" style="gap:1rem;margin-bottom:2.5rem" id="memPlanCards">
            ${availPlans.map(p => `<div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap">
              <div>
                <div style="font-family:var(--font-display);font-size:1.1rem">${esc(p.name)}</div>
                <div class="muted" style="font-size:.85rem">${p.discountPct}% off every service · ${esc(p.description || '')}</div>
              </div>
              <div style="text-align:right">
                <div class="price">${money(p.monthlyPrice)}<span style="font-size:.7rem;font-weight:400">/mo</span></div>
                <button class="btn btn-ghost btn-sm" style="margin-top:.4rem" data-plan-id="${p.id}">Join →</button>
              </div>
            </div>`).join('')}
          </div>`;
        })()}

        <h3 style="margin-top:2rem">Communication preferences</h3>
        <div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:2.5rem">
          <div>
            <div style="font-weight:600">Marketing emails &amp; offers</div>
            <div class="muted" style="font-size:.88rem">${c.marketingOptOut ? 'You are not receiving marketing messages.' : 'You are receiving marketing messages.'}</div>
          </div>
          ${c.marketingOptOut
            ? `<button class="btn btn-ghost btn-sm" id="mktOptin">Re-subscribe</button>`
            : `<button class="btn btn-ghost btn-sm" id="mktOptout">Unsubscribe</button>`}
        </div>`;
      document.getElementById('logout').addEventListener('click', async () => {
        await api.logout(); toast('Logged out.'); setTimeout(() => location.assign('index.html'), 400);
      });
      const copyBtn = document.getElementById('copyRef');
      if (copyBtn) copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(copyBtn.closest('.card').querySelector('code').textContent).then(() => toast('Code copied!')).catch(() => toast('Select and copy the code manually.'));
      });
      const shareBtn = document.getElementById('shareRef');
      if (shareBtn) shareBtn.addEventListener('click', () => {
        const code = shareBtn.closest('.card').querySelector('code').textContent.trim();
        const url = location.origin + '/register.html?ref=' + encodeURIComponent(code);
        if (navigator.share) {
          navigator.share({ title: 'Join Lumière Beauty & Nail Studio', text: 'Sign up for Lumière and get 100 bonus reward points! Use my referral link:', url });
        } else {
          navigator.clipboard.writeText(url).then(() => toast('Referral link copied!')).catch(() => toast('Copy this link: ' + url));
        }
      });
      const mktOptoutBtn = document.getElementById('mktOptout');
      if (mktOptoutBtn) mktOptoutBtn.addEventListener('click', async () => {
        const r = await api.marketingOptout();
        if (r.ok) { toast('Unsubscribed from marketing messages.'); location.reload(); }
        else toast(r.data.error || 'Something went wrong.');
      });
      const mktOptinBtn = document.getElementById('mktOptin');
      if (mktOptinBtn) mktOptinBtn.addEventListener('click', async () => {
        const r = await api.marketingOptin();
        if (r.ok) { toast('You\'re re-subscribed to marketing messages.'); location.reload(); }
        else toast(r.data.error || 'Something went wrong.');
      });
      document.querySelectorAll('[data-plan-id]').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.disabled = true; btn.textContent = 'Joining…';
          const r = await api.subscribeMembership(btn.dataset.planId);
          if (r.ok) { toast('You\'re enrolled! Payment pending — see us at the desk.'); location.reload(); }
          else { btn.disabled = false; btn.textContent = 'Join →'; toast(r.data.error || 'Something went wrong.'); }
        });
      });
    }

    // ---- Inline booking management ----

    async function cancelBooking(id, ref) {
      if (!confirm(`Cancel booking ${ref}? This cannot be undone.`)) return;
      const card = document.getElementById('bcard-' + id);
      if (card) { card.style.opacity = '.5'; card.style.pointerEvents = 'none'; }
      const r = await api.cancel(id);
      if (r.ok) {
        toast('Booking cancelled.');
        if (card) {
          card.style.opacity = '1'; card.style.pointerEvents = '';
          const statusEl = card.querySelector('.status');
          if (statusEl) { statusEl.className = 'status cancelled'; statusEl.textContent = 'cancelled'; }
          const btns = card.querySelectorAll('button');
          btns.forEach(b => b.remove());
        }
      } else {
        if (card) { card.style.opacity = '1'; card.style.pointerEvents = ''; }
        toast(r.data && r.data.error || 'Could not cancel. Please call us.');
      }
    }

    let _rsBookingId = null;
    function openReschedule(id, name, currentDate, staffId, serviceId) {
      _rsBookingId = id;
      document.getElementById('rs-title').textContent = name;
      document.getElementById('rs-date').value = currentDate;
      document.getElementById('rs-slots').innerHTML = '';
      document.getElementById('rs-confirm').disabled = true;
      document.getElementById('rs-svcId').value = serviceId || '';
      document.getElementById('rs-staffId').value = staffId || '';
      document.getElementById('rs-modal').style.display = 'flex';
      loadRsSlots();
    }

    async function loadRsSlots() {
      const date = document.getElementById('rs-date').value;
      const svcId = document.getElementById('rs-svcId').value;
      const staffId = document.getElementById('rs-staffId').value;
      if (!date || !svcId) return;
      document.getElementById('rs-slots').innerHTML = '<span class="muted" style="font-size:.85rem">Loading slots…</span>';
      document.getElementById('rs-confirm').disabled = true;
      const data = await api.availability(svcId, staffId || 'any', date).catch(() => null);
      const slots = data && data.slots ? data.slots.filter(s => s.available) : [];
      if (!slots.length) {
        document.getElementById('rs-slots').innerHTML = '<span class="muted" style="font-size:.85rem">No availability on this date.</span>';
        return;
      }
      document.getElementById('rs-slots').innerHTML = slots.map(s =>
        `<button class="btn btn-ghost btn-sm rs-slot" data-time="${s.time}" style="font-size:.82rem">${s.time}</button>`
      ).join('');
      document.querySelectorAll('.rs-slot').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.rs-slot').forEach(x => x.style.background = '');
        btn.style.background = 'var(--rose)'; btn.style.color = '#fff';
        document.getElementById('rs-confirm').dataset.time = btn.dataset.time;
        document.getElementById('rs-confirm').disabled = false;
      }));
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const [meRes, cfg] = await Promise.all([api.me(), api.config()]);
      if (!meRes.ok) { location.assign('login.html'); return; }
      const refData = await fetch('/api/referral').then(r => r.json()).catch(() => null);
      render(meRes.data, cfg, refData);

      document.getElementById('rs-date').addEventListener('change', loadRsSlots);
      document.getElementById('rs-close').addEventListener('click', () => {
        document.getElementById('rs-modal').style.display = 'none';
        _rsBookingId = null;
      });
      document.getElementById('rs-confirm').addEventListener('click', async () => {
        const date = document.getElementById('rs-date').value;
        const time = document.getElementById('rs-confirm').dataset.time;
        if (!date || !time || !_rsBookingId) return;
        document.getElementById('rs-confirm').disabled = true;
        document.getElementById('rs-confirm').textContent = 'Saving…';
        const r = await api.reschedule(_rsBookingId, date, time);
        if (r.ok) {
          toast('Booking rescheduled to ' + date + ' at ' + time + '.');
          document.getElementById('rs-modal').style.display = 'none';
          location.reload();
        } else {
          document.getElementById('rs-confirm').disabled = false;
          document.getElementById('rs-confirm').textContent = 'Confirm reschedule';
          toast(r.data && r.data.error || 'Could not reschedule. Please call us.');
        }
      });
    });

    window.cancelBooking = cancelBooking;
    window.openReschedule = openReschedule;
  </script>

  <!-- Reschedule modal -->
  <div id="rs-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:16px;padding:2rem;width:min(440px,92vw);max-height:90vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem">
        <h3 style="margin:0;font-size:1.1rem">Reschedule</h3>
        <button id="rs-close" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);line-height:1">&times;</button>
      </div>
      <p class="muted" style="margin:0 0 1rem;font-size:.9rem" id="rs-title"></p>
      <input type="hidden" id="rs-svcId"><input type="hidden" id="rs-staffId">
      <label style="display:block;font-size:.85rem;font-weight:600;margin-bottom:.35rem">New date</label>
      <input type="date" id="rs-date" style="width:100%;box-sizing:border-box;padding:.55rem .8rem;border:1.5px solid var(--line);border-radius:10px;font-family:inherit;font-size:.9rem;margin-bottom:1rem">
      <label style="display:block;font-size:.85rem;font-weight:600;margin-bottom:.5rem">Available times</label>
      <div id="rs-slots" style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.2rem"></div>
      <button id="rs-confirm" class="btn btn-primary" style="width:100%" disabled>Confirm reschedule</button>
    </div>
  </div>
</body>
</html>
